<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Coolium2 Registration</title>
    <link href="Roblox%20Login_data/Roblox.css" type="text/css" rel="stylesheet">
    <meta content="Microsoft Visual Studio .NET 7.1" name="GENERATOR">
    <meta content="C#" name="CODE_LANGUAGE">
    <meta content="JavaScript" name="vs_defaultClientScript">
    <meta content="http://microsoft.com" name="vs_targetSchema">
    <style type="text/css">
        body {
            background-color: white;
            margin-top:0 !important;
            padding-top:0 !important;
        }
    </style>
</head>
<body>
    <form name="Form1" method="post" action="./games.html" id="Form1">
        <p>
            <a id="RobloxLogo1_HyperLink1" href="https://archive.org"><img src="Roblox%20Login_data/roblox_logo.bmp" border="0"></a>
        </p>
        <p>If you aren't a Coolium2 member:</p>
        <table>
            <tbody>
                <tr>
                    <td>Desired Username:</td>
                    <td width="140"><input name="RegName" type="text" id="RegName" required></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Choose Password:</td>
                    <td width="140"><input name="RegPass" type="password" id="RegPass" required></td>
                    <td></td>
                </tr>
                <tr>
                    <td>E-mail Address:</td>
                    <td width="140"><input name="RegEmail" type="email" id="RegEmail" required></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Account Key:</td>
                    <td width="140"><input name="AccountKey" type="text" id="AccountKey" placeholder="XXXX-XXXX" required></td>
                    <td><small style="color: gray; font-family: sans-serif; font-size: 11px;">(Alpha Key Required)</small></td>
                </tr>
                <tr>
                    <td></td>
                    <td width="140"></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td width="140"><input type="submit" name="RegisterBtn" value="Create Account" id="RegisterBtn"></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
        <br>
        <p>&nbsp;</p>
        <p>Already have a Coolium2 member account?</p>
        <p><input type="button" value="Back to Sign in" onclick='window.location.href="./a.html"'><br>
        </p>
    </form>
</body>
</html>
